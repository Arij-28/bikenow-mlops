name: BikeNow CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-python-api:
    name: Tests Python et API
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v6

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --prefer-binary -r requirements.txt
          python -m pip install pytest httpx

      - name: Verifier les fichiers critiques
        run: |
          test -f registry/production/model.joblib
          test -f registry/production/model_card.json
          test -f src/api.py
          test -f Dockerfile

      - name: Lancer les tests
        run: |
          python -m pytest tests/test_registry_model.py tests/test_api.py -q

  docker-build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test-python-api

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v6

      - name: Construire l'image Docker
        run: |
          docker build -t bikenow-api:ci .